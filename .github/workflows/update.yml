name: Lux News Bot
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install feedparser
      - name: Run Scraper
        run: python update_news.py
      - name: Commit and Push
        run: |
          git config --global user.name 'LuxBot'
          git config --global user.email 'bot@importapro.com'
          
          # 1. Agregamos el archivo generado
          git add news.json
          
          # 2. Intentamos el commit (si no hay cambios, no pasa nada)
          if git commit -m "Radar Update: $(date)"; then
            # 3. LÍNEA MAESTRA: Se sincroniza con la nube antes de subir
            git pull --rebase origin main
            # 4. Sube los cambios finales
            git push origin main
          else
            echo "Sin novedades en el radar."
          fi