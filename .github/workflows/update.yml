name: Lux News Bot
on:
  schedule:
    - cron: '0 * * * *' # Corre automáticamente cada 60 minutos
  workflow_dispatch:   # Te permite correrlo manualmente con un botón

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install feedparser
      - name: Run Scraper
        run: python update_news.py
      - name: Commit and Push
        run: |
          git config --global user.name 'LuxBot'
          git config --global user.email 'bot@importapro.com'
          git add news.json
          git commit -m "Radar Update: $(date)" || echo "No hay cambios"
          git push